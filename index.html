<head>
<meta charset="UTF-8">
<title>ねこロボ顔</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<style>
body {
  margin: 0;
  background: #fff;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

  

  

<canvas id="c"></canvas>

<script type="module">
import { expressions } from "./expressions.js";

const c = document.getElementById("c");
const ctx = c.getContext("2d");

let w = window.innerWidth;
let h = window.innerHeight;
c.width = w;
c.height = h;

function getFaceScale(){
  return Math.min(w, h) / 300;
}

let current = { eyeX:0, eyeY:0, blink:1, mouthY:0, mouthCurve:0 };
let target = { eyeX:0, eyeY:0, blink:1, mouthY:0, mouthCurve:0 };

let isResizing = false;
let resizeTimer;

// リサイズ
window.addEventListener("resize", ()=>{
  w = window.innerWidth;
  h = window.innerHeight;
  c.width = w;
  c.height = h;

  isResizing = true;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=> isResizing = false, 500);
});

// ⭐ 表情読み込みに変更（ここが重要）
function newTarget(){
  const exp = expressions[Math.floor(Math.random()*expressions.length)];

  target.eyeX = exp.eyeX();
  target.eyeY = exp.eyeY();
  target.mouthY = exp.mouthY();
  target.mouthCurve = exp.mouthCurve();
}
setInterval(newTarget, 2500);

// まばたき
setInterval(()=>{
  target.blink = 0;
  setTimeout(()=> target.blink = 1, 200);
}, 4000);

function lerp(a,b,t){ return a+(b-a)*t; }

function draw(){
  ctx.clearRect(0,0,w,h);

  for (let k in current){
    current[k] = lerp(current[k], target[k], 0.06);
  }

  const s = getFaceScale();
  const cx = w/2;
  const cy = h/2;

  // 🍶 リサイズ中だけ酔い
  let drunkX = 0;
  let drunkY = 0;
  if (isResizing){
    drunkX = Math.sin(Date.now()*0.01) * 10;
    drunkY = Math.cos(Date.now()*0.008) * 6;
  }

  const r = 12 * s;
  let eyeY = cy - 20*s + current.eyeY*s + drunkY;

  // 👀 目
  ctx.fillStyle = "#333";

  ctx.beginPath();
  ctx.arc(cx - 40*s + current.eyeX*s + drunkX, eyeY, r, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx + 40*s + current.eyeX*s + drunkX, eyeY, r, 0, Math.PI*2);
  ctx.fill();

  // ✨ ハイライト
  let hx = current.eyeX * 0.4 * s;
  let hy = current.eyeY * 0.2 * s;

  ctx.fillStyle = "#fff";

  ctx.beginPath();
  ctx.arc(cx - 40*s + current.eyeX*s + hx - 5*s + drunkX, eyeY - 5*s + hy, 5*s, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx + 40*s + current.eyeX*s + hx - 5*s + drunkX, eyeY - 5*s + hy, 5*s, 0, Math.PI*2);
  ctx.fill();

  // 👁 まばたき
  let hBlink = r * (1 - current.blink);

  ctx.fillRect(cx - 60*s + current.eyeX*s + drunkX, eyeY - r, 40*s, hBlink/2);
  ctx.fillRect(cx - 60*s + current.eyeX*s + drunkX, eyeY + r - hBlink/2, 40*s, hBlink/2);

  ctx.fillRect(cx + 20*s + current.eyeX*s + drunkX, eyeY - r, 40*s, hBlink/2);
  ctx.fillRect(cx + 20*s + current.eyeX*s + drunkX, eyeY + r - hBlink/2, 40*s, hBlink/2);

  // 👄 口
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2 * s;

  let baseY = cy + 40*s + current.mouthY*s + drunkY;

  ctx.beginPath();
  ctx.moveTo(cx - 20*s, baseY);
  ctx.quadraticCurveTo(
    cx,
    baseY + current.mouthCurve*s,
    cx + 20*s,
    baseY
  );
  ctx.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
